<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnemonic Forge | Cognitive Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        /* THE OBSIDIAN SPECTRUM */
        :root { 
            --void: #050505; 
            --cyan: #00F2FF; 
            --violet: #BD00FF; 
            --entropy: #FF3131; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--void); 
            color: white; 
            margin: 0; 
            overflow: hidden; /* THE LOCK - No vertical scrolling allowed */
        }
        
        .lux-serif { font-family: 'Cinzel', serif; letter-spacing: 0.2em; }
        
        /* The Void Background */
        .forge-theme { 
            background: radial-gradient(circle at center, #111111 0%, var(--void) 100%);
            min-height: 100vh;
            position: relative;
        }

        /* Subtle Background Wave Animation (Ocean Floor) */
        .ocean-glow {
            position: absolute;
            bottom: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 150vw;
            height: 50vh;
            background: radial-gradient(ellipse at center, rgba(0,242,255,0.05) 0%, rgba(5,5,5,0) 70%);
            z-index: 0;
            pointer-events: none;
        }

        /* THE HORIZONTAL SHELF (Matches the Archive's scroll mechanic) */
        .module-horizontal {
            display: flex;
            gap: 40px;
            overflow-x: auto;
            padding: 40px 100px 100px 100px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
            z-index: 10;
            position: relative;
        }
        .module-horizontal::-webkit-scrollbar { display: none; /* Chrome/Safari */ }

        /* The Module "Artifacts" (Glassmorphism Cards) */
        .forge-module {
            scroll-snap-align: center;
            min-width: 280px;
            height: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px; /* Luxurious rounded corners */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }
        
        .forge-module:hover {
            transform: translateY(-20px) scale(1.02);
            border-color: rgba(0, 242, 255, 0.3);
            box-shadow: 0 30px 60px rgba(0, 242, 255, 0.1);
        }

        .module-icon {
            font-size: 3rem;
            margin-bottom: auto;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .module-title {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: white;
            text-align: center;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* HUB CONTAINER (Identical mechanic to Archive) */
        .hub-container {
            position: fixed; bottom: 40px; left: 40px; z-index: 100;
            display: flex; flex-direction: column; align-items: center; gap: 20px;
        }
        .hub-btn { 
            width: 75px; height: 75px; background: var(--glass); color: var(--cyan); 
            backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 2.5rem; box-shadow: 0 15px 40px rgba(0,242,255,0.1); cursor: pointer;
            transition: transform 0.5s;
        }
        .menu-bloom { 
            display: flex; flex-direction: column; gap: 15px; 
            transition: 0.5s; opacity: 0; pointer-events: none; transform: translateY(20px); 
        }
        .menu-bloom.active { opacity: 1; pointer-events: auto; transform: translateY(0); }
        
        .sub-btn { 
            width: 70px; height: 70px; border-radius: 50%; background: var(--glass); 
            color: white; display: flex; align-items: center; justify-content: center; 
            font-size: 0.65rem; font-weight: bold; font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
            border: 1px solid var(--glass-border); cursor: pointer; transition: 0.3s;
        }
        .sub-btn:hover { background: rgba(0,242,255,0.1); color: var(--cyan); border-color: var(--cyan); transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="quote-screen" class="fixed inset-0 z-[200] flex flex-col items-center justify-center text-center px-10 bg-[#050505] transition-opacity duration-1000" onclick="enterForge()">
        <p class="text-xl md:text-2xl mb-10 text-[rgba(255,255,255,0.8)]" style="font-family: 'Cinzel', serif; max-width: 800px; line-height: 1.8;">
            "The mind is not a vessel to be filled, but a fire to be kindled—and a blade to be forged in the silence of the void."
        </p>
        <span class="lux-serif text-xs opacity-40 animate-pulse text-[#00F2FF]">TOUCH TO STEP INSIDE</span>
    </div>

    <div id="main-gallery" class="hidden opacity-0 transition-opacity duration-1000 forge-theme h-screen flex flex-col">
        <div class="ocean-glow"></div>
        
        <header class="text-center pt-20 pb-4 z-10">
            <h1 class="lux-serif text-4xl md:text-5xl text-white mb-2" style="text-shadow: 0 0 20px rgba(0, 242, 255, 0.2);">MNEMONIC FORGE</h1>
            <p class="text-[rgba(255,255,255,0.4)]" style="font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;">COGNITIVE OPERATING SYSTEM V1</p>
        </header>

        <div id="shelf" class="module-horizontal flex-1 flex items-center">
            
            <div class="forge-module" onclick="window.location.href='cosmic-web.html'">
                <span class="module-icon">☁️</span>
                <span class="module-title">Cosmic Web</span>
            </div>
            
            <div class="forge-module">
                <span class="module-icon">🌱</span>
                <span class="module-title">Garden of Virtues</span>
            </div>
            
            <div class="forge-module">
                <span class="module-icon">⚡</span>
                <span class="module-title">P-Realm Accelerator</span>
            </div>
            
            <div class="forge-module">
                <span class="module-icon">♟️</span>
                <span class="module-title">Game Matrix</span>
            </div>
            
            <div class="forge-module">
                <span class="module-icon">🕸️</span>
                <span class="module-title">Connections</span>
            </div>

        </div>

        <div class="hub-container">
            <div id="bloom" class="menu-bloom">
                <button class="sub-btn" onclick="window.location.href='https://veridian-studios-lib.github.io/Veridian-Archive/'">ARCHIVE</button>
                <button class="sub-btn">TOOLS</button>
                <button class="sub-btn">GEMINI</button>
            </div>
            <div class="hub-btn" onclick="toggleMenu()">
                <span id="plus" style="transition: 0.5s;">+</span>
            </div>
        </div>
    </div>

    <script>
        function enterForge() {
            document.getElementById('quote-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('quote-screen').classList.add('hidden');
                const gallery = document.getElementById('main-gallery');
                gallery.classList.remove('hidden');
                setTimeout(() => gallery.classList.add('opacity-100'), 50);
            }, 1000);
        }

        function toggleMenu() {
            const bloom = document.getElementById('bloom');
            const plus = document.getElementById('plus');
            const hubBtn = document.querySelector('.hub-btn');

            bloom.classList.toggle('active');
            
            if (bloom.classList.contains('active')) {
                plus.innerHTML = "×";
                plus.style.color = "var(--entropy)"; // Turns Red to close
                hubBtn.style.borderColor = "var(--entropy)";
                hubBtn.style.boxShadow = "0 15px 40px rgba(255,49,49,0.1)";
            } else {
                plus.innerHTML = "+";
                plus.style.color = "var(--cyan)"; // Back to Cyan
                hubBtn.style.borderColor = "var(--glass-border)";
                hubBtn.style.boxShadow = "0 15px 40px rgba(0,242,255,0.1)";
            }
        }
    </script>
</body>
</html>
