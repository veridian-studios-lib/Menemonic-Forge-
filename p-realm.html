<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P-Realm Accelerator | Mnemonic Forge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* THE OBSIDIAN SPECTRUM */
        :root { 
            --void: #050505; 
            --cyan: #00F2FF; 
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--void); 
            color: white; 
            margin: 0; 
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .lux-serif { font-family: 'Cinzel', serif; letter-spacing: 0.2em; }
        .mono-text { font-family: 'JetBrains Mono', monospace; }

        .forge-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #111111 0%, var(--void) 100%);
            z-index: -2;
        }

        /* Heartbeat Visual Entrainment */
        #heartbeat-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: -1;
            transition: opacity 0.5s ease;
            opacity: 0;
            box-shadow: inset 0 0 150px rgba(0, 242, 255, 0);
        }

        #heartbeat-overlay.pulse-active {
            opacity: 1;
            animation: heartbeatPulse 1s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes heartbeatPulse {
            0% { box-shadow: inset 0 0 0px rgba(0, 242, 255, 0); }
            50% { box-shadow: inset 0 0 100px rgba(0, 242, 255, 0.15); }
            100% { box-shadow: inset 0 0 0px rgba(0, 242, 255, 0); }
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Timer Display */
        #timer-display {
            font-size: 5rem;
            line-height: 1;
            font-weight: 700;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            color: var(--cyan);
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        /* Custom Slider Styling */
        input[type=range] {
            -webkit-appearance: none; width: 100%; background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%;
            background: var(--cyan); cursor: pointer; margin-top: -8px;
            box-shadow: 0 0 10px var(--cyan); transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; cursor: pointer; background: var(--glass-border); border-radius: 2px;
        }

        /* Audio Matrix Buttons */
        .freq-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .freq-btn:hover { border-color: rgba(0, 242, 255, 0.4); transform: translateY(-2px); }
        
        .freq-btn.active-glow {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        .freq-icon { font-size: 1.5rem; opacity: 0.8; }
        .freq-name { font-size: 0.7rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .freq-hz { font-size: 0.6rem; opacity: 0.5; font-family: 'JetBrains Mono', monospace; }

        /* Ignite Button */
        #toggle-timer-btn {
            width: 100%; background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--cyan); color: var(--cyan);
            padding: 20px; border-radius: 8px; font-size: 1.2rem;
            font-weight: 700; letter-spacing: 4px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center; gap: 10px;
            margin-top: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #toggle-timer-btn:hover {
            background: var(--cyan); color: var(--void); box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
        }
    </style>
</head>
<body class="p-6 md:p-12 max-w-2xl mx-auto">
    
    <div class="forge-bg"></div>
    <div id="heartbeat-overlay"></div> <header class="mb-8 text-center md:text-left relative z-10">
        <button onclick="window.location.href='index.html'" class="mono-text text-[10px] uppercase opacity-40 hover:opacity-100 hover:text-[#00F2FF] transition-all cursor-pointer">
            ← Return to Sanctum
        </button>
        <h1 class="lux-serif text-3xl mt-4" style="text-shadow: 0 0 20px rgba(0, 242, 255, 0.15);">P-REALM ACCELERATOR</h1>
        <p class="mono-text text-xs opacity-50 mt-2 text-[#00F2FF]">Phantasmagoric Cognitive Entrainment</p>
    </header>

    <main class="glass-panel relative z-10">
        
        <div id="timer-display" class="mono-text">05:00</div>
        
        <div class="mb-10 px-4">
            <div class="flex justify-between text-[10px] mono-text opacity-50 mb-4 uppercase tracking-widest">
                <span>Target Sprint</span>
                <span id="slider-val">5 Minutes</span>
            </div>
            <input type="range" id="time-slider" min="1" max="120" value="5" oninput="document.getElementById('slider-val').innerText = this.value + ' Minutes'">
        </div>

        <div class="w-full h-px bg-white/10 mb-8"></div>

        <div class="mb-4 text-[10px] mono-text opacity-50 text-center uppercase tracking-widest">Neural Acoustic Injection</div>
        <div class="grid grid-cols-3 gap-3 mb-3">
            <div class="freq-btn" onclick="activateState('theta', this)">
                <span class="freq-icon">🌊</span>
                <span class="freq-name">Theta</span>
                <span class="freq-hz">6 Hz</span>
            </div>
            <div class="freq-btn" onclick="activateState('alpha', this)">
                <span class="freq-icon">🍃</span>
                <span class="freq-name">Alpha</span>
                <span class="freq-hz">10 Hz</span>
            </div>
            <div class="freq-btn" onclick="activateState('gamma', this)">
                <span class="freq-icon">⚡</span>
                <span class="freq-name">Gamma</span>
                <span class="freq-hz">40 Hz</span>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div class="freq-btn" onclick="activateState('brown', this)">
                <span class="freq-icon">🤎</span>
                <span class="freq-name">Deep Masking</span>
                <span class="freq-hz">Brown Noise</span>
            </div>
            <div class="freq-btn" onclick="activateState('pink', this)">
                <span class="freq-icon">🩷</span>
                <span class="freq-name">Focus Masking</span>
                <span class="freq-hz">Pink Noise</span>
            </div>
        </div>

        <button id="toggle-timer-btn" class="lux-serif" onclick="toggleTimer()">
            <span>⚡</span> IGNITE SESSION
        </button>

    </main>

    <script src="p-realm.js"></script>
</body>
                  </html>
