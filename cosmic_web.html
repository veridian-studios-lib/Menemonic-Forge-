<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Cosmic Web | Mnemonic Forge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=JetBrains+Mono:wght@300;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --void-bg: #020202; 
            --core-red: #FF1A1A;
            --blue-orb: #00F2FF;
            --red-orb: #FF3131;
            --glass: rgba(10, 10, 10, 0.85);
        }
        
        body { 
            background: var(--void-bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
            touch-action: none; 
            user-select: none;
            -webkit-user-select: none;
        }

        /* THREE.JS BACKGROUND */
        #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* THE AXIOMATIC LATTICE (Pan/Zoom Container) */
        #world-space {
            position: fixed; top: 0; left: 0; width: 0; height: 0; z-index: 1;
            transform-origin: 0 0;
        }

        /* THE SENTIENT CORE */
        .sentient-core {
            position: absolute; left: 0; top: 0; width: 300px; height: 300px;
            border-radius: 50%; transform: translate(-50%, -50%);
            background: radial-gradient(circle at 40% 40%, #ff4b4b, #8a0000 70%, #1a0000 100%);
            box-shadow: 0 0 100px rgba(255, 26, 26, 0.6), inset 0 0 50px rgba(0,0,0,0.8);
            pointer-events: none; animation: corePulse 8s infinite alternate ease-in-out;
        }
        @keyframes corePulse {
            0% { transform: translate(-50%, -50%) scale(0.98); box-shadow: 0 0 80px rgba(255, 26, 26, 0.4); filter: brightness(0.8); }
            100% { transform: translate(-50%, -50%) scale(1.02); box-shadow: 0 0 150px rgba(255, 26, 26, 0.8); filter: brightness(1.2); }
        }

        /* RELATIONS */
        #relation-layer { position: absolute; top: 0; left: 0; width: 1px; height: 1px; overflow: visible; pointer-events: none; }
        .relation-line {
            pointer-events: auto; cursor: pointer;
            stroke: rgba(255, 255, 255, 0.3); stroke-width: 2;
            transition: stroke 0.3s, filter 0.3s, stroke-width 0.3s;
        }
        .relation-line:hover {
            stroke: rgba(255, 255, 255, 1); filter: drop-shadow(0 0 8px #FFF); stroke-width: 4;
        }

        /* WISDOM ORBS */
        #orb-layer { position: absolute; top: 0; left: 0; width: 0; height: 0; }
        .orb {
            position: absolute; width: 24px; height: 24px; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: auto; cursor: grab;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 25px currentColor, inset 0 0 10px currentColor;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), currentColor);
            transition: transform 0.2s, box-shadow 0.3s, border 0.2s;
        }
        .orb:active { cursor: grabbing; transform: translate(-50%, -50%) scale(1.1); }
        .orb.linking-active { border: 3px solid #FFF; transform: translate(-50%, -50%) scale(1.4); box-shadow: 0 0 40px #FFF; }
        
        .orb-label {
            position: absolute; top: 35px;
            font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
            white-space: nowrap; opacity: 0.9; pointer-events: none;
            text-transform: uppercase; letter-spacing: 0.1em; text-shadow: 0 2px 5px rgba(0,0,0,1);
        }

        /* SOVEREIGN UI */
        .ui-layer { position: fixed; inset: 0; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .interactive { pointer-events: auto; }
        
        .cmd-bar { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; margin-top: auto; }
        
        .btn-void {
            background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); color: white;
            padding: 14px 24px; text-transform: uppercase; letter-spacing: 0.2em; font-size: 11px;
            font-family: 'JetBrains Mono', monospace; font-weight: 700; cursor: pointer; transition: 0.3s;
            border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn-void:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.4); }
        
        .btn-devour { border-color: var(--core-red); color: var(--core-red); }
        .btn-devour:hover { background: rgba(255, 26, 26, 0.1); box-shadow: 0 0 20px rgba(255, 26, 26, 0.3); }

        .btn-relation.active { background: #FFF; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.5); }

        /* MODALS (The Scriptorium) */
        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            z-index: 100; pointer-events: auto;
            align-items: center; justify-content: center; opacity: 0;
            transition: opacity 0.3s;
        }
        .modal.active { display: flex; opacity: 1; }
        .modal-content {
            background: #050505; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px; border-radius: 12px; box-shadow: 0 30px 60px rgba(0,0,0,1);
            width: 90%; max-width: 450px;
        }

        input, textarea {
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 15px; margin-bottom: 20px; outline: none; font-family: 'Inter', sans-serif;
            border-radius: 6px; transition: border-color 0.3s;
        }
        input:focus, textarea:focus { border-color: var(--core-red); background: rgba(255,255,255,0.05); }
        textarea { height: 140px; resize: none; }
        
        .lux-header { font-family: 'Cinzel', serif; letter-spacing: 0.3em; text-transform: uppercase; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="world-space">
        <div class="sentient-core"></div>
        <svg id="relation-layer"></svg>
        <div id="orb-layer"></div>
    </div>

    <div class="ui-layer">
        <div class="flex justify-start interactive">
            <button onclick="window.location.href='index.html'" class="text-white/30 hover:text-white font-mono text-[10px] tracking-widest transition-colors">&larr; EXIT VOID</button>
        </div>

        <div class="cmd-bar interactive">
            <button id="linkModeBtn" onclick="toggleLinkMode()" class="btn-void btn-relation">Forge Bonds</button>
            <button onclick="openModal('modal-add-wisdom')" class="btn-void btn-devour">DEVOUR SEED</button>
        </div>
    </div>

    <div id="modal-add-wisdom" class="modal">
        <div class="modal-content">
            <h2 class="lux-header text-2xl mb-6 text-center text-[#FF1A1A] drop-shadow-[0_0_10px_rgba(255,26,26,0.4)]">Devour Wisdom</h2>
            <input id="wisdom-title" type="text" placeholder="Designation (e.g., Physics)">
            <textarea id="wisdom-content" placeholder="Inscribe axiomatic data..."></textarea>
            <div class="flex justify-between items-center mt-4">
                <button onclick="closeModal('modal-add-wisdom')" class="text-[11px] font-mono uppercase text-white/40 hover:text-white">Abort</button>
                <button onclick="commitWisdom()" class="btn-void btn-devour py-3 px-6">Manifest Orb</button>
            </div>
        </div>
    </div>

    <div id="modal-add-relation" class="modal">
        <div class="modal-content">
            <h2 class="lux-header text-xl mb-4 text-center text-white">Synthesize Bond</h2>
            <p id="relation-nodes-text" class="text-[11px] text-center font-mono text-[#00F2FF] mb-6 uppercase tracking-widest"></p>
            <input id="relation-title" type="text" placeholder="Bond Name (e.g., Causes, Requires)">
            <textarea id="relation-content" placeholder="Define the systemic link..."></textarea>
            <div class="flex justify-between items-center mt-4">
                <button onclick="closeModal('modal-add-relation')" class="text-[11px] font-mono uppercase text-white/40 hover:text-white">Abort</button>
                <button onclick="commitRelation()" class="btn-void py-3 px-6">Fuse Nodes</button>
            </div>
        </div>
    </div>

    <div id="modal-orb-info" class="modal">
        <div class="modal-content flex flex-col items-center">
            <div id="info-orb-display" class="w-16 h-16 rounded-full mb-6" style="box-shadow: 0 0 40px currentColor; background: currentColor;"></div>
            <h2 id="info-title" class="lux-header text-3xl mb-4 text-center">Title</h2>
            <div id="info-content" class="text-sm text-white/80 mb-8 leading-relaxed text-justify font-mono p-4 bg-white/5 rounded-md w-full">Content</div>
            
            <div class="flex w-full justify-between items-center mt-2">
                <button onclick="closeModal('modal-orb-info')" class="text-[11px] font-mono uppercase text-white/40 hover:text-white">Close</button>
                <button onclick="reviseOrb()" class="btn-void border-[#00F2FF] text-[#00F2FF]">Revise & Restore</button>
            </div>
        </div>
    </div>

    <div id="modal-relation-info" class="modal">
        <div class="modal-content">
            <h2 id="rel-info-title" class="lux-header text-2xl mb-2 text-center text-white">Bond</h2>
            <p id="rel-info-nodes" class="text-[11px] text-center font-mono text-[#00F2FF] mb-6 uppercase tracking-widest"></p>
            <div id="rel-info-content" class="text-sm text-white/80 mb-6 leading-relaxed text-justify font-mono p-4 bg-white/5 rounded-md">Content</div>
            <div class="flex justify-center mt-2">
                <button onclick="closeModal('modal-relation-info')" class="btn-void">Close Bond</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. THREE.JS ATMOSPHERIC ENGINE ---
        const scene = new THREE.Scene();
        const cameraThree = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        // Generate 1500 particles for depth
        for (let i = 0; i < 1500; i++) {
            vertices.push(
                Math.random() * 2000 - 1000, 
                Math.random() * 2000 - 1000, 
                Math.random() * 2000 - 1000
            );
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.6 });
        const particles = new THREE.Points(geometry, material);
        scene.add(particles);
        cameraThree.position.z = 500;

        function animateBg() {
            requestAnimationFrame(animateBg);
            particles.rotation.x += 0.0003;
            particles.rotation.y += 0.0004;
            renderer.render(scene, cameraThree);
        }
        animateBg();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            cameraThree.aspect = window.innerWidth / window.innerHeight;
            cameraThree.updateProjectionMatrix();
        });

        // --- 2. CAMERA PHYSICS (WORLD SPACE) ---
        // Center the core on load
        let camera = { x: window.innerWidth / 2, y: window.innerHeight / 2, z: 1 };
        const worldSpace = document.getElementById('world-space');
        let isPanning = false; let lastPanPos = { x: 0, y: 0 };
        
        function applyCamera() { worldSpace.style.transform = `translate(${camera.x}px, ${camera.y}px) scale(${camera.z})`; }
        applyCamera();

        // Mouse Wheel Zoom
        window.addEventListener('wheel', (e) => {
            if(e.target.closest('.modal') || e.target.closest('.interactive')) return;
            const delta = -e.deltaY * 0.0015;
            let newZ = Math.min(Math.max(0.2, camera.z + delta), 4);
            camera.x = e.clientX - (e.clientX - camera.x) * (newZ / camera.z);
            camera.y = e.clientY - (e.clientY - camera.y) * (newZ / camera.z);
            camera.z = newZ;
            applyCamera();
        });

        // Pinch & Pan state
        let initialPinchDist = null; let initialZoom = 1;

        // --- 3. AXIOMATIC LATTICE STATE ---
        let orbs = JSON.parse(localStorage.getItem('mnemonic_orbs_v2')) || [];
        let relations = JSON.parse(localStorage.getItem('mnemonic_relations_v2')) || [];
        
        let linkMode = false; let selectedForLink = null; let targetForLink = null;
        let activeOrbId = null; let draggedOrb = null;

        // Biological Decay Math: Blue (0,242,255) -> Red (255,49,49) over 7 days
        function calculateOrbColor(lastRevised) {
            const decayTimeMs = 7 * 24 * 60 * 60 * 1000; 
            const elapsed = Date.now() - lastRevised;
            let ratio = Math.min(elapsed / decayTimeMs, 1);
            
            const r = Math.round(0 + (255 - 0) * ratio);
            const g = Math.round(242 + (49 - 242) * ratio);
            const b = Math.round(255 + (49 - 255) * ratio);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function saveData() {
            localStorage.setItem('mnemonic_orbs_v2', JSON.stringify(orbs));
            localStorage.setItem('mnemonic_relations_v2', JSON.stringify(relations));
        }

        function renderWeb() {
            const orbLayer = document.getElementById('orb-layer');
            const svgLayer = document.getElementById('relation-layer');
            orbLayer.innerHTML = ''; svgLayer.innerHTML = '';

            relations.forEach(rel => {
                const orbA = orbs.find(o => o.id === rel.sourceId);
                const orbB = orbs.find(o => o.id === rel.targetId);
                if(orbA && orbB) {
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", orbA.x); line.setAttribute("y1", orbA.y);
                    line.setAttribute("x2", orbB.x); line.setAttribute("y2", orbB.y);
                    line.classList.add("relation-line");
                    line.onclick = () => openRelationInfo(rel.id);
                    svgLayer.appendChild(line);
                }
            });

            orbs.forEach(orb => {
                const el = document.createElement('div');
                el.classList.add('orb');
                el.style.left = `${orb.x}px`; el.style.top = `${orb.y}px`;
                
                el.style.color = calculateOrbColor(orb.lastRevised);
                if(selectedForLink === orb.id) el.classList.add('linking-active');

                const label = document.createElement('div');
                label.classList.add('orb-label');
                label.innerText = orb.title;
                el.appendChild(label);

                el.onpointerdown = (e) => handleOrbPointerDown(e, orb);
                el.onpointerup = (e) => handleOrbPointerUp(e, orb);
                orbLayer.appendChild(el);
            });
        }
        setInterval(renderWeb, 60000); // 1 min update

        // --- 4. SOVEREIGN COMMANDS (Double Tap & Drag) ---
        let lastTapTime = 0; let tapDist = 0; let initialTapPos = {x:0, y:0};

        function handleOrbPointerDown(e, orb) {
            e.stopPropagation();
            initialTapPos = {x: e.clientX, y: e.clientY};
            if (linkMode) {
                if (!selectedForLink) {
                    selectedForLink = orb.id; renderWeb();
                } else if (selectedForLink !== orb.id) {
                    targetForLink = orb.id;
                    document.getElementById('relation-nodes-text').innerText = `${orbs.find(o=>o.id==selectedForLink).title} ↔ ${orb.title}`;
                    openModal('modal-add-relation');
                } else { selectedForLink = null; renderWeb(); }
            } else { draggedOrb = orb; }
        }

        function handleOrbPointerUp(e, orb) {
            if(linkMode) return;
            const dist = Math.hypot(e.clientX - initialTapPos.x, e.clientY - initialTapPos.y);
            const now = Date.now();
            
            // Double Tap Logic (if not dragged)
            if(dist < 10) {
                if(now - lastTapTime < 350) { openOrbInfo(orb.id); lastTapTime = 0; } 
                else { lastTapTime = now; }
            }
        }

        // Global Pan & Input
        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.interactive') || e.target.closest('.orb') || e.target.closest('.modal')) return;
            isPanning = true; lastPanPos = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 2) {
                isPanning = false; draggedOrb = null;
                initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initialZoom = camera.z;
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (draggedOrb) {
                draggedOrb.x += e.movementX / camera.z; draggedOrb.y += e.movementY / camera.z;
                renderWeb();
            } else if (isPanning && e.pointerType !== 'touch') { 
                camera.x += (e.clientX - lastPanPos.x); camera.y += (e.clientY - lastPanPos.y);
                lastPanPos = { x: e.clientX, y: e.clientY }; applyCamera();
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 2 && initialPinchDist) {
                const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                camera.z = Math.min(Math.max(0.2, initialZoom * (currentDist / initialPinchDist)), 4);
                applyCamera();
            } else if (e.touches.length === 1 && isPanning) {
                camera.x += (e.touches[0].clientX - lastPanPos.x); camera.y += (e.touches[0].clientY - lastPanPos.y);
                lastPanPos = { x: e.touches[0].clientX, y: e.touches[0].clientY }; applyCamera();
            }
        });

        window.addEventListener('pointerup', () => { if (draggedOrb) saveData(); draggedOrb = null; isPanning = false; initialPinchDist = null; });
        window.addEventListener('touchend', (e) => { if (e.touches.length < 2) initialPinchDist = null; isPanning = false; });

        function toggleLinkMode() {
            linkMode = !linkMode;
            const btn = document.getElementById('linkModeBtn');
            btn.classList.toggle('active', linkMode);
            btn.innerText = linkMode ? "CANCEL BONDS" : "FORGE BONDS";
            selectedForLink = null; renderWeb();
        }

        // --- 5. DATA MUTATIONS ---
        function commitWisdom() {
            const title = document.getElementById('wisdom-title').value;
            const content = document.getElementById('wisdom-content').value;
            if(!title) return;

            // Spawns slightly offset from the Core
            const spawnX = (Math.random() * 200) - 100;
            const spawnY = (Math.random() * 200) - 100;

            orbs.push({ id: Date.now().toString(), title: title, content: content, x: spawnX, y: spawnY, lastRevised: Date.now() });

            document.getElementById('wisdom-title').value = ''; document.getElementById('wisdom-content').value = '';
            saveData(); renderWeb(); closeModal('modal-add-wisdom');
        }

        function commitRelation() {
            relations.push({
                id: 'rel-' + Date.now(), sourceId: selectedForLink, targetId: targetForLink,
                title: document.getElementById('relation-title').value, content: document.getElementById('relation-content').value
            });
            selectedForLink = null; targetForLink = null;
            document.getElementById('relation-title').value = ''; document.getElementById('relation-content').value = '';
            toggleLinkMode(); saveData(); renderWeb(); closeModal('modal-add-relation');
        }

        function reviseOrb() {
            const orb = orbs.find(o => o.id === activeOrbId);
            orb.lastRevised = Date.now(); // Restores frequency to pure blue
            saveData(); renderWeb(); closeModal('modal-orb-info');
        }

        // --- 6. UI HELPERS ---
        function openModal(id) { const m = document.getElementById(id); m.style.display = 'flex'; setTimeout(() => m.classList.add('active'), 10); }
        function closeModal(id) { const m = document.getElementById(id); m.classList.remove('active'); setTimeout(() => m.style.display = 'none', 300); }

        function openOrbInfo(id) {
            activeOrbId = id; const orb = orbs.find(o => o.id === id);
            document.getElementById('info-title').innerText = orb.title;
            document.getElementById('info-content').innerText = orb.content;
            document.getElementById('info-orb-display').style.color = calculateOrbColor(orb.lastRevised);
            openModal('modal-orb-info');
        }

        function openRelationInfo(id) {
            const rel = relations.find(r => r.id === id);
            document.getElementById('rel-info-title').innerText = rel.title;
            document.getElementById('rel-info-nodes').innerText = `${orbs.find(o=>o.id==rel.sourceId).title} ↔ ${orbs.find(o=>o.id==rel.targetId).title}`;
            document.getElementById('rel-info-content').innerText = rel.content;
            openModal('modal-relation-info');
        }

        renderWeb();
    </script>
</body>
</html>
